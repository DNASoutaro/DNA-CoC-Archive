name: 探索者データ自動抽出

# トリガー2種:
#  1) schedule … 週1の定期実行(毎週月曜 日本時間 朝9時頃)
#  2) workflow_dispatch … Actionsタブからの手動起動(任意のタイミング)
on:
  schedule:
    # cronはUTC。日本時間 月曜09:00 = UTC 月曜00:00
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      tag:
        description: '抽出するタグ名'
        required: true
        default: '遺伝子の探索者'

# characters.json をコミットするための書き込み権限
permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリを取得
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存をインストール
        run: pip install requests

      - name: 抽出スクリプトを実行
        run: |
          python fetch_charasheet_ashell.py "${{ github.event.inputs.tag || '遺伝子の探索者' }}"

      - name: 取得件数を検証(安全弁)
        run: |
          COUNT=$(python -c "import json;print(json.load(open('characters.json',encoding='utf-8'))['count'])")
          echo "取得件数: $COUNT"
          # 取得が極端に少ない(例:50未満)場合は異常とみなし失敗させてコミットを防ぐ
          if [ "$COUNT" -lt 50 ]; then
            echo "::error::取得件数が異常に少ないため中止します ($COUNT 件)"
            exit 1
          fi

      - name: characters.json をコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add characters.json
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "自動更新: characters.json ($(date +'%Y-%m-%d %H:%M'))"
            git push
          fi
